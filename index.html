:16px;opacity:.6}.about-panel{position:fixed;z-index:15;top:92px;right:clamp(12px,2vw,28px);width:min(350px,calc(100vw - 24px));font-size:13px;line-height:1.35;color:rgba(17,17,15,.74);opacity:0;transform:translateY(-8px);pointer-events:none;transition:opacity .18s,transform .18s}.about-panel.is-open{opacity:1;transform:translateY(0);pointer-events:auto}

<base target="_blank">
</head>
<body>
  <main class="site" aria-label="Portfolio carousel">
    <section class="carousel-shell" aria-label="Selected works"><div class="carousel" id="carousel"></div></section>
    <section class="project-info" aria-live="polite"><p class="counter" id="counter">01 / 01</p><h1 class="current-title" id="currentTitle">Loading...</h1><p class="current-note" id="currentNote"></p></section>
    <aside class="about-panel" id="aboutPanel"><p>Independent designer and creative technologist making identities, interactive websites, installations, motion systems, and visual experiments for culture-led clients.</p></aside>
    <aside class="index-panel" id="indexPanel" aria-label="Project index"></aside>
    <div class="controls" aria-label="Carousel controls"><button class="icon-button" type="button" id="prevButton" aria-label="Previous project" title="Previous project">&larr;</button><button class="mode-button" type="button" id="overviewButton" aria-pressed="true">Overview</button><button class="mode-button" type="button" id="indexButton" aria-pressed="false">Index</button><button class="icon-button" type="button" id="nextButton" aria-label="Next project" title="Next project">&rarr;</button></div>
  </main>

  <!-- Debug Panel -->
  <div class="debug-panel" id="debugPanel"></div>
  <button style="position:fixed;top:8px;right:8px;z-index:201;font-size:10px;padding:4px 8px;background:rgba(0,0,0,.7);color:#0f0;border:0;border-radius:3px;cursor:pointer;" id="debugToggle" type="button">Debug</button>

  <!-- Admin Trigger -->
  <button class="admin-trigger" id="adminTrigger" type="button">Admin</button>

  <!-- Admin Login Modal -->
  <div class="admin-modal" id="adminModal" aria-hidden="true">
    <div class="admin-box">
      <h2 style="margin:0 0 14px;font-size:18px;text-transform:uppercase;">Admin Access</h2>
      <label style="font-size:11px;text-transform:uppercase;color:var(--muted);">Password</label>
      <input type="password" class="admin-input" id="adminPassword" placeholder="----">
      <div style="display:flex;justify-content:flex-end;margin-top:4px;">
        <button class="admin-btn secondary" id="cancelAdmin" type="button">Cancel</button>
        <button class="admin-btn" id="loginAdmin" type="button">Enter</button>
      </div>
    </div>
  </div>

  <!-- Admin Panel -->
  <div class="admin-panel" id="adminPanel" aria-hidden="true">
    <div class="admin-header">
      <h2 style="margin:0;font-size:16px;text-transform:uppercase;">Project Admin</h2>
      <div style="display:flex;gap:8px;">
        <button class="admin-btn" style="margin:0;" id="addProjectBtn" type="button">+ Add Project</button>
        <button class="admin-btn secondary" style="margin:0;" id="exitAdmin" type="button">Exit</button>
      </div>
    </div>
    <div class="admin-content" id="adminContent"></div>
  </div>

  <!-- Project Detail / Dive-in -->
  <div class="project-detail" id="projectDetail" aria-hidden="true">
    <div class="detail-header">
      <div>
        <h2 style="margin:0;font-size:clamp(24px,5vw,48px);text-transform:uppercase;line-height:.9;" id="detailTitle">Project</h2>
        <p style="margin:6px 0 0;font-size:12px;color:var(--muted);text-transform:uppercase;" id="detailMeta">Tags - Description</p>
      </div>
      <button class="icon-button" id="closeDetail" type="button" aria-label="Close project" style="font-size:22px;width:48px;height:48px;">&times;</button>
    </div>
    <div class="detail-grid" id="detailGrid"></div>
    <div class="detail-body">
      <p class="detail-note" id="detailNote"></p>
      <p class="detail-meta" id="detailTags"></p>
      <a class="detail-link" id="detailLink" href="#" target="_blank" rel="noreferrer">View Project</a>
    </div>
  </div>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox" aria-hidden="true">
    <button class="lightbox-close" id="lightboxClose" type="button" aria-label="Close">&times;</button>
    <button class="lightbox-nav lightbox-prev" id="lightboxPrev" type="button" aria-label="Previous">&larr;</button>
    <div class="lightbox-stage" id="lightboxStage"></div>
    <button class="lightbox-nav lightbox-next" id="lightboxNext" type="button" aria-label="Next">&rarr;</button>
    <div class="lightbox-caption" id="lightboxCaption"></div>
  </div>

  <script>
    /* ==================== DEBUG LOGGER ==================== */

    const debugLogs = [];
    function log(msg) {
      const line = '[' + new Date().toLocaleTimeString() + '] ' + msg;
      debugLogs.push(line);
      if(debugLogs.length > 50) debugLogs.shift();
      debugPanel.innerHTML = debugLogs.join('<br>');
      console.log(line);
    }
    document.querySelector('#debugToggle').addEventListener('click', () => {
      debugPanel.classList.toggle('is-open');
    });

        files: [

        ]

    /* State */
    let projects=[];
    let active=0;
    let dragStart=null;
    let wheelLock=false;
    let isAdmin=false;
    let pendingUpload=null;

    /* DOM refs */
    const carousel=document.querySelector("#carousel");
    const indexPanel=document.querySelector("#indexPanel");

    const lightbox=document.querySelector("#lightbox");
    const lightboxStage=document.querySelector("#lightboxStage");
    const lightboxCaption=document.querySelector("#lightboxCaption");

    /* Create fresh file input each time to guarantee change events */
    function createFileInput(){
      const old=document.getElementById('globalFileInput');
      if(old)old.remove();
      const input=document.createElement('input');
      input.type='file';
      input.id='globalFileInput';
      input.accept='image/*,video/*';
      input.style.display='none';
      input.addEventListener('change',handleFileChange);
      document.body.appendChild(input);
      return input;
    }

    /* ==================== FIXED: Persistence with version check ==================== */
    const STORAGE_KEY = 'portfolio_projects_v10';  // Bumped version to force refresh
    const DEFAULTS_HASH = DEFAULT_PROJECTS.map(p => p.title).join('|');

    function loadProjects(){
      const raw=localStorage.getItem(STORAGE_KEY);
      const savedHash=localStorage.getItem(STORAGE_KEY + '_hash');

      // If no saved data, or DEFAULT_PROJECTS changed, use defaults
      if(!raw || savedHash !== DEFAULTS_HASH){
        log('Using DEFAULT_PROJECTS (localStorage missing or stale)');
        projects=structuredClone(DEFAULT_PROJECTS);
        saveProjects();
      }else{
        try{
          projects=JSON.parse(raw);
          log('Loaded ' + projects.length + ' projects from localStorage');
        }catch(e){
          log('localStorage parse failed, using defaults');
          projects=structuredClone(DEFAULT_PROJECTS);
          saveProjects();
        }
      }
    }
    function saveProjects(){
      localStorage.setItem(STORAGE_KEY,JSON.stringify(projects));
      localStorage.setItem(STORAGE_KEY + '_hash', DEFAULTS_HASH);
      log('Saved ' + projects.length + ' projects to localStorage');

    /* ==================== END FIX ==================== */

    /* Image resize -> base64 */
    function resizeImage(file,maxWidth=1400,quality=0.82){
      return new Promise((resolve,reject)=>{
        const img=new Image();
        const url=URL.createObjectURL(file);
        img.onload=()=>{
          const canvas=document.createElement('canvas');
          const ctx=canvas.getContext('2d');
          let w=img.width,h=img.height;
          if(w>maxWidth){h=Math.round((maxWidth/w)*h);w=maxWidth;}
          canvas.width=w;canvas.height=h;
          ctx.fillStyle='#dedbd2';ctx.fillRect(0,0,w,h);
          ctx.drawImage(img,0,0,w,h);
          resolve(canvas.toDataURL('image/jpeg',quality));
          URL.revokeObjectURL(url);
        };
        img.onerror=()=>{URL.revokeObjectURL(url);reject(new Error('Image load failed'));}
      });
    }
    /* Generate poster frame from video file */
    function generateVideoPoster(file,maxWidth=800,quality=0.82){
      return new Promise((resolve,reject)=>{
        const video=document.createElement('video');
        video.muted=true;
        video.playsInline=true;
        video.preload='auto';
        const url=URL.createObjectURL(file);
        video.src=url;
        video.addEventListener('loadeddata',()=>{video.currentTime=0.1;});
        video.addEventListener('seeked',()=>{
          const canvas=document.createElement('canvas');
          const ctx=canvas.getContext('2d');
          let w=video.videoWidth,h=video.videoHeight;
          if(w>maxWidth){h=Math.round((maxWidth/w)*h);w=maxWidth;}
          if(w===0||h===0){URL.revokeObjectURL(url);reject(new Error('Invalid video dimensions'));return;}
          canvas.width=w;canvas.height=h;
          ctx.fillStyle='#dedbd2';ctx.fillRect(0,0,w,h);
          ctx.drawImage(video,0,0,w,h);
          resolve(canvas.toDataURL('image/jpeg',quality));
          URL.revokeObjectURL(url);
        });
        video.addEventListener('error',()=>{URL.revokeObjectURL(url);reject(new Error('Video load failed'));}
        );
        video.load();
      });
    }

    /* Helpers */
    function pad(v){return String(v).padStart(2,"0")}
    function shortestOffset(i){const t=projects.length;let o=i-active;if(o>t/2)o-=t;if(o<-t/2)o+=t;return o}
    function coverUrl(p){return p.files&&p.files[0]?p.files[0].url:'data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7';}

    /* ==================== FIXED: getFileType handles base64 data URLs ==================== */
    function getFileType(f){
      if(!f)return 'image';
      if(f.type)return f.type;
      const url=f.url||'';
      if(url.startsWith('data:video/'))return 'video';
      if(url.startsWith('data:image/'))return 'image';
      const ext=url.split('.').pop().toLowerCase();
      if(['mp4','webm','mov','mkv','avi','m4v'].includes(ext))return 'video';
      return 'image';
    }
    function isVideo(f){return getFileType(f)==='video';}
    /* ==================== END FIX ==================== */

    /* Dark video placeholder SVG (base64) */
    const VIDEO_PLACEHOLDER = 'data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iNTIiIGhlaWdodD0iNTIiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+PHJlY3Qgd2lkdGg9IjUyIiBoZWlnaHQ9IjUyIiBmaWxsPSIjMTExIi8+PHBhdGggZD0iTTE4IDE2bDIwIDEwLTIwIDEweiIgZmlsbD0iIzMzMyIvPjwvc3ZnPg==';

    /* ==================== FIXED: Build carousel cards with DOM API + error handling ==================== */
    function buildWorkCard(p, i){
      const article = document.createElement('article');
      article.className = 'work';
      article.dataset.index = i;

      const f = p.files && p.files[0];
      if(f && isVideo(f)){
        const wrapper = document.createElement('div');
        wrapper.style.cssText = 'position:relative;width:100%;height:100%;background:#111;';

        const video = document.createElement('video');
        video.src = f.url;
        if(f.poster) video.poster = f.poster;
        video.muted = true;
        video.loop = true;
        video.autoplay = true;
        video.playsInline = true;
        video.preload = 'auto';
        video.disablePictureInPicture = true;
        video.style.cssText = 'width:100%;height:100%;object-fit:cover;display:block;';

        // Log video status for debugging
        log('Project ' + i + ' (' + p.title + '): video src=' + f.url.substring(0,60) + '...');

        video.addEventListener('loadeddata', function(){
          log('Project ' + i + ' (' + p.title + '): video loadeddata');
          this.muted = true;
          this.play().catch(e => log('Autoplay prevented for ' + p.title + ': ' + e));
        });

        video.addEventListener('error', function(e){
          const err = this.error;
          const code = err ? err.code : 'unknown';
          const msg = err ? (err.message || 'code:'+code) : 'no error object';
          log('VIDEO ERROR ' + p.title + ': ' + msg + ' (code=' + code + ')');
          // Show error indicator
          this.style.display = 'none';
          const errDiv = document.createElement('div');
          errDiv.style.cssText = 'position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;text-transform:uppercase;letter-spacing:.05em;';
          errDiv.textContent = 'Video Error';
          wrapper.appendChild(errDiv);
        });

        const badge = document.createElement('span');
        badge.textContent = 'Video';
        badge.style.cssText = 'position:absolute;bottom:10px;right:10px;background:rgba(0,0,0,.55);color:#fff;font-size:9px;text-transform:uppercase;letter-spacing:.06em;padding:4px 8px;border-radius:3px;pointer-events:none;z-index:3;';

        wrapper.appendChild(video);
        wrapper.appendChild(badge);
        article.appendChild(wrapper);
      }else if(f){
        const img = document.createElement('img');
        img.src = f.url;
        img.alt = p.title;
        img.addEventListener('error', () => log('IMAGE ERROR ' + p.title + ': failed to load ' + f.url));
        article.appendChild(img);
      }else{
        const img = document.createElement('img');
        img.src = 'data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7';
        article.appendChild(img);
      }

      const meta = document.createElement('div');
      meta.className = 'work-meta';
      meta.innerHTML = '<h2 class="work-title">'+p.title+'</h2><p class="work-detail"><span>'+p.tags+'</span><span>'+p.description.substring(0,18)+'...</span></p>';
      article.appendChild(meta);

      article.addEventListener('click', () => openDetail(i));
      return article;
    }
    /* ==================== END FIX ==================== */

    /* Thumbnail URL for index panel */
    function thumbUrl(p){
      const f=p.files&&p.files[0];
      if(!f)return 'data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7';
      if(isVideo(f)){
        if(f.poster)return f.poster;
        return VIDEO_PLACEHOLDER;
      }
      return f.url;
    }

    /* Rendering */
    function render(){
      log('render() called, projects=' + projects.length);
      carousel.innerHTML = '';
      projects.forEach((p, i) => {
        carousel.appendChild(buildWorkCard(p, i));
      });

      indexPanel.innerHTML=projects.map((p,i)=>{
        const f=p.files&&p.files[0];
        let thumbHtml;
        if(f&&isVideo(f)){
          if(f.poster){
            thumbHtml='<div class="index-thumb"><img src="'+f.poster+'" alt=""><span class="play-icon">&#9654;</span></div>';
          }else{
            thumbHtml='<div class="index-thumb" style="background:#111;"><span class="play-icon">&#9654;</span></div>';
          }
        }else{
          thumbHtml='<img class="index-thumb" src="'+thumbUrl(p)+'" alt="">';
        }
        return '<button class="index-row" type="button" data-index="'+i+'" aria-current="false">'+thumbHtml+'<span>'+p.title+'<br><span style="color:var(--muted)">'+p.tags+'</span></span><span>'+p.description.substring(0,12)+'...</span></button>';
      }).join('');

      indexPanel.querySelectorAll('.index-row').forEach(r=>r.addEventListener('click',()=>{goTo(Number(r.dataset.index));setIndex(false)}));
      update();
    }

    function update(){
      const m=window.innerWidth<760,cx=m?38:150,cy=m?-16:-36;
      carousel.querySelectorAll('.work').forEach((card,i)=>{
        const o=shortestOffset(i),a=Math.abs(o);
        card.style.setProperty('--x',cx+o*(m?54:112));
        card.style.setProperty('--y',cy-o*(m?36:52));
        card.style.setProperty('--z',-a*52);
        card.style.setProperty('--r',o*-4);
        card.style.setProperty('--opacity',a>4?0:1-a*.08);
        card.style.setProperty('--sat',i===active?1:.76);
        card.style.setProperty('--blur',a>3?1.5:0);
        card.style.zIndex=100-a;
      });
      const p=projects[active]||{};
      currentTitle.textContent=p.title||'';
      currentNote.textContent=p.note||'';
      counter.textContent=pad(active+1)+' / '+pad(projects.length)+' -- '+(p.tags||'');
      indexPanel.querySelectorAll('.index-row').forEach(r=>r.setAttribute('aria-current',String(Number(r.dataset.index)===active)));
    }

    function goTo(i){active=(i+projects.length)%projects.length;update()}

    function setIndex(open){
      indexPanel.classList.toggle('is-open',open);
      indexButton.setAttribute('aria-pressed',String(open));
      overviewButton.setAttribute('aria-pressed',String(!open));
    }

    /* Dive-in Detail */
    function openDetail(i){
      const p=projects[i];
      if(!p)return;
      detailTitle.textContent=p.title;
      detailMeta.textContent=(p.tags||'')+' - '+(p.description||'').substring(0,60)+(p.description&&p.description.length>60?'...':'');
      detailNote.textContent=p.note||'';
      detailTags.textContent=p.tags||'';
      detailLink.href=p.projectLink||'#';
      detailLink.style.display=p.projectLink?'inline-block':'none';
      detailGrid.innerHTML=(p.files||[]).map((f,fi)=>{
        const type=getFileType(f);
        const media=type==='video'
          ?'<video muted preload="metadata" playsinline><source src="'+f.url+'" type="video/mp4"></video>'
          :'<img src="'+f.url+'" alt="'+(f.caption||p.title)+'">';
        const cap=f.caption?'<div class="detail-caption">'+f.caption+'</div>':'';
        return '<div class="detail-media" data-proj="'+i+'" data-file="'+fi+'">'+media+cap+'</div>';
      }).join('');
      detailGrid.querySelectorAll('.detail-media').forEach(el=>el.addEventListener('click',()=>{
        openLightbox(Number(el.dataset.proj),Number(el.dataset.file));
      }));
      projectDetail.classList.add('is-open');
      projectDetail.setAttribute('aria-hidden','false');
      document.body.style.overflow='hidden';
    }
    function closeDetail(){
      projectDetail.classList.remove('is-open');
      projectDetail.setAttribute('aria-hidden','true');
      document.body.style.overflow='hidden';
    }

    /* Lightbox */
    function openLightbox(projIdx,fileIdx){
      const p=projects[projIdx]; if(!p)return;
      const f=p.files[fileIdx]; if(!f)return;
      currentLightbox={projIdx,fileIdx};
      const type=getFileType(f);
      if(type==='video'){
        lightboxStage.innerHTML='<video controls autoplay playsinline style="max-width:92vw;max-height:92vh;"><source src="'+f.url+'" type="video/mp4"></video>';
      }else{
        lightboxStage.innerHTML='<img src="'+f.url+'" alt="'+(f.caption||'')+'" style="max-width:92vw;max-height:92vh;object-fit:contain;">';
      }
      lightboxCaption.textContent=f.caption||p.title||'';
      lightbox.classList.add('is-open');
      lightbox.setAttribute('aria-hidden','false');
    }
    function closeLightbox(){
      lightbox.classList.remove('is-open');
      lightbox.setAttribute('aria-hidden','true');
      lightboxStage.innerHTML='';
      currentLightbox=null;
    }
    function lightboxPrev(){
      if(!currentLightbox)return;
      const p=projects[currentLightbox.projIdx];
      let fi=currentLightbox.fileIdx-1;
      if(fi<0)fi=p.files.length-1;
      openLightbox(currentLightbox.projIdx,fi);
    }
    function lightboxNext(){
      if(!currentLightbox)return;
      const p=projects[currentLightbox.projIdx];
      let fi=currentLightbox.fileIdx+1;
      if(fi>=p.files.length)fi=0;
      openLightbox(currentLightbox.projIdx,fi);
    }

    /* Admin */
    function openAdminLogin(){adminModal.classList.add('is-open');adminModal.setAttribute('aria-hidden','false');adminPassword.value='';adminPassword.focus();}
    function closeAdminLogin(){adminModal.classList.remove('is-open');adminModal.setAttribute('aria-hidden','true');}
    function enterAdmin(){
      if(adminPassword.value==='1410'){
        isAdmin=true;closeAdminLogin();renderAdmin();adminPanel.classList.add('is-open');adminPanel.setAttribute('aria-hidden','false');
      }else{
        adminPassword.style.borderColor='#b42318';setTimeout(()=>adminPassword.style.borderColor='',400);
      }
    }
    function exitAdmin(){isAdmin=false;adminPanel.classList.remove('is-open');adminPanel.setAttribute('aria-hidden','true');}

    /* ==================== FIXED: handleFileChange ==================== */
    function handleFileChange(e){
      const file=e.target.files&&e.target.files[0];
      if(!file||!pendingUpload)return;
      log('Uploading file: ' + file.name + ' (' + file.type + ') for project ' + pendingUpload.projIdx);
      const isVideo=file.type.startsWith('video/');
      const projIdx=pendingUpload.projIdx;
      const process=(dataUrl,type,poster)=>{
        const payload={url:dataUrl,caption:'',type:type};
        if(poster)payload.poster=poster;

        const projFiles = projects[projIdx].files;
        const isOnlyPlaceholder = projFiles.length === 1 && projFiles[0].url === 'img/placeholder.jpg';

        if(pendingUpload.action==='new'){
          if(isOnlyPlaceholder){
            projects[projIdx].files = [payload];
            log('Replaced placeholder with new ' + type);
          }else{
            projects[projIdx].files.push(payload);
            log('Appended new ' + type + ' to existing files');
          }
        }else{
          const oldCap=projects[projIdx].files[pendingUpload.fileIdx].caption||'';
          projects[projIdx].files[pendingUpload.fileIdx]={...payload,caption:oldCap};
          log('Replaced file at index ' + pendingUpload.fileIdx);
        }

        saveProjects();renderAdmin();render();update();
        pendingUpload=null;
        createFileInput();
      };

      if(isVideo){
        const reader=new FileReader();
        reader.onload=(ev)=>{
          const videoUrl=ev.target.result;
          log('Video read complete, generating poster...');
          generateVideoPoster(file).then(poster=>{
            log('Poster generated');
            process(videoUrl,'video',poster);
          }).catch(err=>{
            log('Poster generation failed: ' + err.message);
            process(videoUrl,'video');
          });
        };
        reader.onerror=()=>{log('Video read failed');alert('Video read failed');pendingUpload=null;createFileInput();};
        reader.readAsDataURL(file);
      }else{
        resizeImage(file).then(dataUrl=>{
          log('Image processed');
          process(dataUrl,'image');
        }).catch(err=>{
          log('Image processing failed: ' + err.message);
          alert('Image processing failed: '+err.message);
          pendingUpload=null;createFileInput();
        });
      }
    }
    /* ==================== END FIX ==================== */

    /* Drag and drop reorder */
    function handleDragStart(e){
      dragSrcEl=this;
      e.dataTransfer.effectAllowed='move';
      e.dataTransfer.setData('text/html',this.innerHTML);
      this.classList.add('dragging');
    }
    function handleDragOver(e){if(e.preventDefault)e.preventDefault();e.dataTransfer.dropEffect='move';return false;}
    function handleDragEnter(e){this.classList.add('over');}
    function handleDragLeave(e){this.classList.remove('over');}
    function handleDrop(e){
      if(e.stopPropagation)e.stopPropagation();
      if(dragSrcEl!==this){
        const srcIdx=Number(dragSrcEl.dataset.fileindex);
        const dstIdx=Number(this.dataset.fileindex);
        const projIdx=Number(dragSrcEl.dataset.proj);
        const files=projects[projIdx].files;
        const [moved]=files.splice(srcIdx,1);
        files.splice(dstIdx,0,moved);
        saveProjects();renderAdmin();render();update();
      }
      return false;
    }
    function handleDragEnd(e){
      this.classList.remove('dragging');
      adminContent.querySelectorAll('.admin-file-row').forEach(row=>row.classList.remove('over'));
    }

    function renderAdmin(){
      adminContent.innerHTML=projects.map((p,i)=>{
        const filesHtml=(p.files||[]).map((f,fi)=>{
          const type=getFileType(f);
          const thumb=type==='video'?(f.poster?'<img class="admin-thumb" src="'+f.poster+'">':'<div class="admin-thumb" style="display:flex;align-items:center;justify-content:center;background:#111;color:#fff;font-size:8px;text-transform:uppercase;letter-spacing:.05em;">Video</div>'):'<img class="admin-thumb" src="'+f.url+'">';
          return '<div class="admin-file-row" draggable="true" data-proj="'+i+'" data-fileindex="'+fi+'"><span class="drag-handle">&#9776;</span>'+thumb+'<input type="text" data-proj="'+i+'" data-file="'+fi+'" data-field="url" value="'+f.url+'" placeholder="Image URL or base64"><button type="button" class="upload-btn upload-replace" data-proj="'+i+'" data-file="'+fi+'">Upload</button><input type="text" data-proj="'+i+'" data-file="'+fi+'" data-field="caption" value="'+(f.caption||'')+'" placeholder="Caption"><button type="button" class="remove-file" data-proj="'+i+'" data-file="'+fi+'">Remove</button></div>';
        }).join('');
        return '<div class="admin-card" data-index="'+i+'"><div class="admin-field"><label>Title</label><input type="text" data-proj="'+i+'" data-field="title" value="'+p.title+'"></div><div class="admin-field"><label>Description</label><textarea data-proj="'+i+'" data-field="description">'+(p.description||'')+'</textarea></div><div class="admin-field"><label>Tags</label><input type="text" data-proj="'+i+'" data-field="tags" value="'+(p.tags||'')+'"></div><div class="admin-field"><label>Project Link</label><input type="text" data-proj="'+i+'" data-field="projectLink" value="'+(p.projectLink||'')+'"></div><div class="admin-field"><label>Note</label><textarea data-proj="'+i+'" data-field="note">'+(p.note||'')+'</textarea></div><label style="font-size:10px;text-transform:uppercase;color:var(--muted);letter-spacing:.04em;">Files (drag to reorder)</label><div class="admin-files" id="files-'+i+'">'+filesHtml+'</div><div class="admin-actions"><button type="button" class="upload-btn upload-new" data-proj="'+i+'">Upload Image / Video</button><button type="button" class="add-file" data-proj="'+i+'">+ Add URL</button><button type="button" class="primary save-proj" data-proj="'+i+'">Save Project</button><button type="button" class="danger delete-proj" data-proj="'+i+'">Delete Project</button></div></div>';
      }).join('');

      adminContent.querySelectorAll('input, textarea').forEach(el=>el.addEventListener('change',e=>{
        const projIdx=Number(e.target.dataset.proj);
        const field=e.target.dataset.field;
        if(field==='url'||field==='caption'){
          const fileIdx=Number(e.target.dataset.file);
          projects[projIdx].files[fileIdx][field]=e.target.value;
        }else{
          projects[projIdx][field]=e.target.value;
        }
        saveProjects();render();update();
      }));

      adminContent.querySelectorAll('.upload-replace').forEach(btn=>btn.addEventListener('click',e=>{
        pendingUpload={projIdx:Number(e.target.dataset.proj),fileIdx:Number(e.target.dataset.file)};
        createFileInput().click();
      }));
      adminContent.querySelectorAll('.upload-new').forEach(btn=>btn.addEventListener('click',e=>{
        pendingUpload={projIdx:Number(e.target.dataset.proj),action:'new'};
        createFileInput().click();
      }));
      adminContent.querySelectorAll('.add-file').forEach(btn=>btn.addEventListener('click',e=>{
        const idx=Number(e.target.dataset.proj);
        if(!projects[idx].files)projects[idx].files=[];
        projects[idx].files.push({url:'img/placeholder.jpg',caption:'',type:'image'});
        saveProjects();renderAdmin();render();update();
      }));
      adminContent.querySelectorAll('.remove-file').forEach(btn=>btn.addEventListener('click',e=>{
        const pIdx=Number(e.target.dataset.proj);
        const fIdx=Number(e.target.dataset.file);
        projects[pIdx].files.splice(fIdx,1);
        if(projects[pIdx].files.length===0)projects[pIdx].files=[{url:'img/placeholder.jpg',caption:'',type:'image'}];
        saveProjects();renderAdmin();render();update();
      }));
      adminContent.querySelectorAll('.save-proj').forEach(btn=>btn.addEventListener('click',e=>{
        const idx=Number(e.target.dataset.proj);
        const card=adminContent.querySelector('.admin-card[data-index="'+idx+'"]');
        const getVal=(field)=>card.querySelector('[data-proj="'+idx+'"][data-field="'+field+'"]').value;
        projects[idx].title=getVal('title');
        projects[idx].description=getVal('description');
        projects[idx].tags=getVal('tags');
        projects[idx].projectLink=getVal('projectLink');
        projects[idx].note=getVal('note');
        saveProjects();render();update();
        e.target.textContent='Saved';setTimeout(()=>e.target.textContent='Save Project',1200);
      }));
      adminContent.querySelectorAll('.delete-proj').forEach(btn=>btn.addEventListener('click',e=>{
        const idx=Number(e.target.dataset.proj);
        if(!confirm('Delete "'+projects[idx].title+'"?'))return;
        projects.splice(idx,1);
        if(active>=projects.length)active=projects.length-1;
        if(active<0)active=0;
        saveProjects();renderAdmin();render();update();
      }));

      /* Bind drag events */
      adminContent.querySelectorAll('.admin-file-row').forEach(row=>{
        row.addEventListener('dragstart',handleDragStart);
        row.addEventListener('dragover',handleDragOver);
        row.addEventListener('dragenter',handleDragEnter);
        row.addEventListener('dragleave',handleDragLeave);
        row.addEventListener('drop',handleDrop);
        row.addEventListener('dragend',handleDragEnd);
      });
    }

    /* Event Listeners */
    document.querySelector('#nextButton').addEventListener('click',()=>goTo(active+1));
    document.querySelector('#prevButton').addEventListener('click',()=>goTo(active-1));
    indexButton.addEventListener('click',()=>setIndex(!indexPanel.classList.contains('is-open')));
    overviewButton.addEventListener('click',()=>setIndex(false));
    document.querySelector('#closeDetail').addEventListener('click',closeDetail);
    document.querySelector('#adminTrigger').addEventListener('click',openAdminLogin);
    document.querySelector('#cancelAdmin').addEventListener('click',closeAdminLogin);
    document.querySelector('#loginAdmin').addEventListener('click',enterAdmin);
    document.querySelector('#exitAdmin').addEventListener('click',exitAdmin);
    document.querySelector('#addProjectBtn').addEventListener('click',()=>{
      projects.push({title:"New Project",description:"Short description",tags:"Tags",projectLink:"https://example.com",note:"Full description",files:[{url:"img/placeholder.jpg",caption:"",type:"image"}]});
      saveProjects();renderAdmin();render();goTo(projects.length-1);
    });
    adminPassword.addEventListener('keydown',e=>{if(e.key==='Enter')enterAdmin();});

    /* Lightbox controls */
    document.querySelector('#lightboxClose').addEventListener('click',closeLightbox);
    document.querySelector('#lightboxPrev').addEventListener('click',lightboxPrev);
    document.querySelector('#lightboxNext').addEventListener('click',lightboxNext);
    lightbox.addEventListener('click',e=>{if(e.target===lightbox)closeLightbox();});

    window.addEventListener('keydown',e=>{
      if(e.key==='ArrowRight'){
        if(lightbox.classList.contains('is-open'))lightboxNext();else goTo(active+1);
      }
      if(e.key==='ArrowLeft'){
        if(lightbox.classList.contains('is-open'))lightboxPrev();else goTo(active-1);
      }
      if(e.key==='Escape'){
        if(lightbox.classList.contains('is-open')){closeLightbox();return;}
        if(projectDetail.classList.contains('is-open')){closeDetail();return;}
        setIndex(false);aboutPanel.classList.remove('is-open');
        if(adminPanel.classList.contains('is-open'))exitAdmin();
        if(adminModal.classList.contains('is-open'))closeAdminLogin();
      }
    });
    window.addEventListener('wheel',e=>{
      if(wheelLock||lightbox.classList.contains('is-open')||projectDetail.classList.contains('is-open')||adminPanel.classList.contains('is-open'))return;
      wheelLock=true;goTo(active+(e.deltaY>0?1:-1));window.setTimeout(()=>wheelLock=false,520);
    },{passive:true});
    window.addEventListener('pointerdown',e=>{
      if(lightbox.classList.contains('is-open')||projectDetail.classList.contains('is-open')||adminPanel.classList.contains('is-open'))return;
      dragStart={x:e.clientX,y:e.clientY};
    });
    window.addEventListener('pointerup',e=>{
      if(!dragStart||lightbox.classList.contains('is-open')||projectDetail.classList.contains('is-open')||adminPanel.classList.contains('is-open'))return;
      const dx=e.clientX-dragStart.x,dy=e.clientY-dragStart.y;
      if(Math.abs(dx)>42&&Math.abs(dx)>Math.abs(dy))goTo(active+(dx<0?1:-1));
      dragStart=null;
    });
    window.addEventListener('resize',update);

    /* Init */
    createFileInput();
    loadProjects();
    render();
  </script>
</body>
</html>
